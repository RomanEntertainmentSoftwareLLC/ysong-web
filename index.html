<!doctype html>
<html lang="en">
  <head>
	<script>
		(function () {
			try {
			var KEY = 'ysong-theme';
			var saved = localStorage.getItem(KEY);
			var prefersDark = window.matchMedia &&
				window.matchMedia('(prefers-color-scheme: dark)').matches;
			var theme = saved || (prefersDark ? 'dark' : 'light');

			var root = document.documentElement;
			if (theme === 'dark') root.classList.add('dark');
			else root.classList.remove('dark');
			// hint the UA while CSS loads (affects form controls, scrollbars, etc.)
			root.style.colorScheme = theme;
			} catch (e) {}
		})();
	</script>

	<!-- optional: micro prepaint to avoid a white flash before CSS arrives -->
	<style>html{background:#0a0a0a;color-scheme:dark}</style>

    <meta charset="UTF-8" />
	<!-- Open Graph -->
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://www.ysong.ai/" />
	<meta property="og:title" content="%VITE_APP_NAME% - Your ultimate AI music co-pilot" />
	<meta property="og:description" content="Create, transform, generate, and learn music with advanced AI models on desktop, mobile, and the web." />
	<meta property="og:image" content="https://www.ysong.ai/social/ysong-logo-darkmode-social.png" />
	<meta property="og:image:width" content="524" />
	<meta property="og:image:height" content="522" />
	<meta property="og:site_name" content="%VITE_APP_NAME%" />

	<!-- Twitter -->

	<meta name="twitter:title" content="%VITE_APP_NAME% — Your ultimate AI music co-pilot" />
	<meta name="twitter:description" content="Create, transform, generate, and learn music with advanced AI models." />
	<meta name="twitter:image" content="https://www.ysong.ai/social/ysong-logo-darkmode-social.png" />
